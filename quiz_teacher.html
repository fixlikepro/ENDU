<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Teacher — Fixlikepro Quiz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');
:root{
  --bg:#0D0B09;--bg2:#181512;--bg3:#211D1A;--bg4:#2C2820;--bg5:#352F2A;
  --orange:#E8793C;--orangeD:#B85A1E;
  --teal:#0D9E75;--purple:#7F77DD;--blue:#3498DB;--pink:#E91E63;
  --white:#F5F0EB;--gray1:#C8C0B8;--gray2:#7A736C;--gray3:#3A3530;
  --green:#27AE60;--red:#E74C3C;--amber:#D4A017;
  --greenDark:#0A2416;--redDark:#2C0A0A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;padding-bottom:60px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg2);border-bottom:1px solid var(--bg4);position:sticky;top:0;z-index:30;}
.brand{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--orange);}
.role-tag{font-size:11px;background:var(--bg4);padding:4px 10px;border-radius:20px;color:var(--gray1);}
.live-wrap{display:flex;align-items:center;gap:6px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.4s infinite;}
.live-lbl{font-size:12px;color:var(--green);font-weight:600;}

.screen{display:none;padding:22px 18px;}
.screen.active{display:block;}

/* ── SELECT QUIZ ── */
.page-title{font-size:22px;font-weight:700;margin-bottom:6px;}
.page-sub{font-size:14px;color:var(--gray2);margin-bottom:24px;}
.quiz-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.quiz-card{background:var(--bg2);border:2px solid var(--bg4);border-radius:12px;padding:16px 14px;cursor:pointer;transition:all .2s;position:relative;}
.quiz-card:hover{transform:translateY(-2px);}
.quiz-card.selected{transform:translateY(-2px);}
.quiz-card.selected::after{content:'✓';position:absolute;top:10px;right:12px;font-size:14px;font-weight:700;}
.qc-level{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
.qc-name{font-size:18px;font-weight:700;margin-bottom:3px;}
.qc-desc{font-size:11px;color:var(--gray2);line-height:1.4;}
.qc-pass{font-size:10px;margin-top:8px;padding:3px 8px;border-radius:20px;display:inline-block;font-weight:600;}
/* card colors */
.cb1{border-color:transparent;}.cb1.selected{background:#061A10;border-color:var(--teal);}.cb1 .qc-level,.cb1 .qc-name,.cb1.selected::after{color:var(--teal);}.cb1 .qc-pass{background:#E1F5EE;color:#097A59;}
.cb2{border-color:transparent;}.cb2.selected{background:#1A0A04;border-color:var(--orange);}.cb2 .qc-level,.cb2 .qc-name,.cb2.selected::after{color:var(--orange);}.cb2 .qc-pass{background:#FAECE7;color:#B85A1E;}
.ca1{border-color:transparent;}.ca1.selected{background:#0D0B1C;border-color:var(--purple);}.ca1 .qc-level,.ca1 .qc-name,.ca1.selected::after{color:var(--purple);}.ca1 .qc-pass{background:#EEEDFE;color:#534AB7;}
.ca2{border-color:transparent;}.ca2.selected{background:#071019;border-color:var(--blue);}.ca2 .qc-level,.ca2 .qc-name,.ca2.selected::after{color:var(--blue);}.ca2 .qc-pass{background:#EBF5FB;color:#1F6FAB;}
.btn{display:block;width:100%;border:none;border-radius:10px;padding:15px;font-size:16px;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;transition:all .2s;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-orange{background:var(--orange);color:var(--bg);}
.btn-orange:hover:not(:disabled){background:var(--orangeD);}
.btn-red{background:var(--redDark);color:var(--red);border:1.5px solid var(--red);}
.btn-red:hover{background:#3E0E0E;}

/* ── SESSION ACTIVE ── */
.session-header{text-align:center;padding:20px 0 24px;}
.pin-label{font-size:12px;color:var(--gray2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.pin-display{font-size:64px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--orange);letter-spacing:.12em;line-height:1;}
.pin-hint{font-size:13px;color:var(--gray2);margin-top:8px;}
.session-info{display:flex;gap:10px;margin-bottom:20px;}
.si-card{flex:1;background:var(--bg2);border:1px solid var(--bg4);border-radius:10px;padding:12px;text-align:center;}
.si-n{font-size:22px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.si-n.o{color:var(--orange);}.si-n.g{color:var(--green);}.si-n.r{color:var(--red);}
.si-l{font-size:11px;color:var(--gray2);margin-top:3px;}
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.prog-track{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .5s;}
.prog-pct{font-size:12px;color:var(--green);font-family:'IBM Plex Mono',monospace;white-space:nowrap;}
.weak-wrap{background:var(--bg2);border:1px solid var(--bg4);border-radius:10px;padding:14px;margin-bottom:16px;}
.weak-title{font-size:11px;font-weight:700;color:var(--gray2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.weak-row{display:flex;flex-wrap:wrap;gap:5px;}
.wchip{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}
.wchip.high{background:var(--redDark);color:var(--red);border:1px solid var(--red);}
.wchip.med{background:#2A1A0A;color:var(--amber);border:1px solid var(--amber);}
.wchip.low{background:var(--greenDark);color:var(--green);border:1px solid var(--green);}
.wchip.none{color:var(--gray3);}

/* ── STUDENT LIST ── */
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.list-title{font-size:13px;font-weight:700;}
.sort-wrap{display:flex;gap:4px;}
.sort-btn{font-size:11px;padding:3px 9px;border-radius:20px;background:transparent;border:1px solid var(--bg5);color:var(--gray2);cursor:pointer;font-family:'Sarabun',sans-serif;}
.sort-btn.active{background:var(--orange);border-color:var(--orange);color:var(--bg);}
.s-list{display:flex;flex-direction:column;gap:7px;margin-bottom:20px;}
.s-row{background:var(--bg2);border:1px solid var(--bg4);border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:9px;animation:rowIn .3s ease;}
.s-row.pr{border-left:3px solid var(--green);}.s-row.fr{border-left:3px solid var(--red);}
.s-rank{font-size:11px;color:var(--gray3);font-family:'IBM Plex Mono',monospace;min-width:20px;text-align:right;}
.s-info{flex:1;min-width:0;}
.s-name{font-size:14px;font-weight:600;}
.s-meta{font-size:11px;color:var(--gray2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.s-right{text-align:right;flex-shrink:0;}
.s-score{font-size:17px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.s-score.p{color:var(--green);}.s-score.f{color:var(--red);}
.s-pct{font-size:10px;color:var(--gray2);}
.s-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:2px;}
.s-badge.p{background:var(--greenDark);color:var(--green);border:1px solid var(--green);}
.s-badge.f{background:var(--redDark);color:var(--red);border:1px solid var(--red);}

.last-updated{text-align:center;font-size:10px;color:var(--gray3);padding:4px 0 10px;}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;transition:all .3s;background:var(--bg3);border:1px solid var(--bg5);border-radius:20px;padding:8px 16px;font-size:12px;color:var(--green);white-space:nowrap;z-index:99;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.3);}}
@keyframes rowIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">FIXLIKEPRO</span>
  <span class="role-tag">หน้าครู</span>
  <div class="live-wrap" id="live-wrap" style="display:none"><div class="live-dot"></div><span class="live-lbl">SESSION ใช้งาน</span></div>
</div>

<!-- ══ SCREEN: SELECT QUIZ ══ -->
<div class="screen active" id="scr-select">
  <p class="page-title">เปิด Session ใหม่</p>
  <p class="page-sub">เลือกชุดข้อสอบ แล้วกด "เปิด Session" เพื่อรับ PIN แชร์ให้นักเรียน</p>
  <div class="quiz-grid" id="quiz-grid">
    <!-- filled by JS from QUIZ_SETS -->
  </div>
  <button class="btn btn-orange" id="btn-open" disabled onclick="openSession()">เปิด Session →</button>
</div>

<!-- ══ SCREEN: SESSION ACTIVE ══ -->
<div class="screen" id="scr-session">
  <div class="session-header">
    <div class="pin-label">PIN สำหรับนักเรียน</div>
    <div class="pin-display" id="pin-display">----</div>
    <div class="pin-hint" id="pin-hint">แชร์ PIN นี้ให้นักเรียนกรอกในหน้าข้อสอบ</div>
  </div>
  <div class="session-info">
    <div class="si-card"><div class="si-n o" id="cnt-submit">0</div><div class="si-l">ส่งแล้ว</div></div>
    <div class="si-card"><div class="si-n g" id="cnt-pass">0</div><div class="si-l">ผ่าน</div></div>
    <div class="si-card"><div class="si-n r" id="cnt-fail">0</div><div class="si-l">ไม่ผ่าน</div></div>
    <div class="si-card"><div class="si-n" id="avg-score" style="color:var(--amber)">-</div><div class="si-l">เฉลี่ย</div></div>
  </div>
  <div class="prog-row">
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <span class="prog-pct" id="prog-pct">0% ผ่าน</span>
  </div>
  <div class="weak-wrap">
    <div class="weak-title">หัวข้อที่ตอบผิดบ่อย</div>
    <div class="weak-row" id="weak-row"><span class="wchip none">รอข้อมูล...</span></div>
  </div>
  <div class="list-header">
    <span class="list-title">รายชื่อ</span>
    <div class="sort-wrap">
      <button class="sort-btn active" id="sort-time"  onclick="setSort('time')">ล่าสุด</button>
      <button class="sort-btn"        id="sort-score" onclick="setSort('score')">คะแนน</button>
      <button class="sort-btn"        id="sort-name"  onclick="setSort('name')">ชื่อ</button>
    </div>
  </div>
  <div class="s-list" id="s-list"></div>
  <div class="last-updated" id="last-updated"></div>
  <button class="btn btn-red" onclick="closeSession()">ปิด Session</button>
</div>

<div class="toast" id="toast"></div>

<!-- ══ FIREBASE ══ -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import{getFirestore,collection,doc,setDoc,updateDoc,query,where,orderBy,onSnapshot,serverTimestamp,getDocs,deleteDoc}
  from"https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

// ┌──────────────────────────────────────────────────┐
// │  วาง Firebase Config ที่นี่                       │
// └──────────────────────────────────────────────────┘
const firebaseConfig={
  apiKey:"AIzaSyB2rLc1FFlq_GgPpmKJfH6CkNWKlS1VeIE",
  authDomain:"endu-training-center.firebaseapp.com",
  projectId:"endu-training-center",
  storageBucket:"endu-training-center.firebasestorage.app",
  messagingSenderId:"753650086986",
  appId:"1:753650086986:web:554de37bee5ee25713a2b3"
};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let sessionPin=null,unsubResults=null,sortMode="time";

/* ── Open Session ── */
window.openSession=async()=>{
  const setKey=window._selectedSet;
  if(!setKey)return;
  const pin=String(Math.floor(1000+Math.random()*9000));
  sessionPin=pin;
  await setDoc(doc(db,"sessions",pin),{
    quizKey:setKey,
    quizName:window.QUIZ_SETS[setKey].name,
    pin,
    active:true,
    createdAt:serverTimestamp()
  });
  document.getElementById("pin-display").textContent=pin;
  document.getElementById("pin-hint").textContent=
    "ชุด: "+window.QUIZ_SETS[setKey].name+" · แชร์ PIN นี้ให้นักเรียน";
  document.getElementById("live-wrap").style.display="flex";
  showScr("scr-session");
  listenResults(pin);
};

/* ── Listen Results ── */
function listenResults(pin){
  if(unsubResults)unsubResults();
  const q=query(collection(db,"results"),where("pin","==",pin),orderBy("submittedAt","desc"));
  unsubResults=onSnapshot(q,snap=>{
    const rows=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderResults(rows);
    document.getElementById("last-updated").textContent=
      "อัปเดตล่าสุด "+new Date().toLocaleTimeString("th-TH");
  });
}

/* ── Render Results ── */
function renderResults(rows){
  const total=rows.length,pass=rows.filter(r=>r.passed).length,fail=total-pass;
  const avg=total?(rows.reduce((s,r)=>s+r.score,0)/total).toFixed(1):"-";
  const pp=total?Math.round(pass/total*100):0;
  document.getElementById("cnt-submit").textContent=total;
  document.getElementById("cnt-pass").textContent=pass;
  document.getElementById("cnt-fail").textContent=fail;
  document.getElementById("avg-score").textContent=avg;
  document.getElementById("prog-fill").style.width=pp+"%";
  document.getElementById("prog-pct").textContent=pp+"% ผ่าน";
  const tc={};rows.forEach(r=>(r.wrongTopics||[]).forEach(t=>{tc[t]=(tc[t]||0)+1;}));
  const we=document.getElementById("weak-row");
  if(!Object.keys(tc).length){we.innerHTML=`<span class="wchip none">${total===0?"รอข้อมูล...":"ยังไม่มีข้อผิด 🎉"}</span>`;}
  else{we.innerHTML=Object.entries(tc).sort((a,b)=>b[1]-a[1]).map(([t,cnt])=>{
    const p=Math.round(cnt/total*100);
    return`<span class="wchip ${p>=50?"high":p>=25?"med":"low"}">${t} (${cnt}/${total})</span>`;
  }).join("");}
  const sorted=[...rows];
  if(sortMode==="score")sorted.sort((a,b)=>b.score-a.score);
  else if(sortMode==="name")sorted.sort((a,b)=>a.name.localeCompare(b.name,"th"));
  const le=document.getElementById("s-list");
  if(!total){le.innerHTML=`<div style="text-align:center;padding:40px 0;color:var(--gray3)">รอนักเรียนส่ง...</div>`;return;}
  le.innerHTML=sorted.map((r,i)=>{
    const cls=r.passed?"p":"f",time=r.submittedAt?.toDate?r.submittedAt.toDate().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"}):"";
    const ws=(r.wrongTopics||[]).length?"ผิดหัวข้อ: "+(r.wrongTopics||[]).join(", "):"ถูกทุกข้อ 🎉";
    return`<div class="s-row ${r.passed?"pr":"fr"}">
      <span class="s-rank">${i+1}</span>
      <div class="s-info"><div class="s-name">${r.name}</div><div class="s-meta">${ws}</div></div>
      <div class="s-right">
        <div class="s-score ${cls}">${r.score}/${r.total||15}</div>
        <div class="s-pct">${r.pct}%${time?" · "+time:""}</div>
        <span class="s-badge ${cls}">${r.passed?"ผ่าน ✓":"ยังไม่ผ่าน"}</span>
      </div>
    </div>`;
  }).join("");
}

/* ── Sort ── */
window.setSort=(mode)=>{
  sortMode=mode;
  ["time","score","name"].forEach(m=>{
    document.getElementById("sort-"+m).className="sort-btn"+(m===mode?" active":"");
  });
  if(unsubResults)unsubResults();
  listenResults(sessionPin);
};

/* ── Close Session ── */
window.closeSession=async()=>{
  if(!confirm("ปิด Session PIN "+sessionPin+" หรือเปล่า?\nนักเรียนจะส่งข้อสอบเพิ่มไม่ได้อีก"))return;
  await updateDoc(doc(db,"sessions",sessionPin),{active:false,closedAt:serverTimestamp()});
  if(unsubResults){unsubResults();unsubResults=null;}
  sessionPin=null;
  document.getElementById("live-wrap").style.display="none";
  window._selectedSet=null;
  document.querySelectorAll(".quiz-card").forEach(c=>c.classList.remove("selected"));
  document.getElementById("btn-open").disabled=true;
  showToast("ปิด Session แล้ว");
  showScr("scr-select");
};

function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.className="toast show";setTimeout(()=>{t.className="toast";},3500);}
function showScr(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");window.scrollTo({top:0});}
window._showToast=showToast;
</script>

<!-- ══ QUIZ SETS + CARD BUILDER ══ -->
<script>
/* ════════════════════════════════════════════════════
   เพิ่มชุดข้อสอบใหม่ที่นี่
   ════════════════════════════════════════════════════ */
window.QUIZ_SETS = {
  basic1:{
    name:"Basic H1",label:"BASIC",level:"H1",
    desc:"แกะ iPhone & Android · เปลี่ยนแบต · เปลี่ยนจอ",
    passLine:80,cardCls:"cb1",color:"#0D9E75",
    passBg:"#E1F5EE",passColor:"#097A59",
    qs:[
      {cat:"เครื่องมือ",q:"ไขควงสำหรับถอดสกรู iPhone รุ่นใหม่คือชนิดใด?",ch:["Philips #00","Pentalobe P2","Torx T5","Flathead"],ans:1,ex:"iPhone ใช้สกรู Pentalobe (ดาว 5 แฉก) ต้องใช้ไขควง P2 โดยเฉพาะ"},
      {cat:"เครื่องมือ",q:"Spudger ใช้ทำอะไร?",ch:["ถอดสกรู","งัดฝาและ connector โดยไม่ทำลายชิ้นส่วน","วัดแรงดัน","ตัดสาย"],ans:1,ex:"Spudger งัดและแยกชิ้นส่วนโดยไม่ขีดข่วนหรือ short วงจร"},
      {cat:"สายแฟลต",q:"ZIF connector ถอดอย่างไรถูกต้อง?",ch:["ดึงตรงแรงๆ","เปิดฝาล็อกก่อน แล้วดึงสายออก","อุ่น heat gun","ตัดสาย"],ans:1,ex:"ต้องเปิดฝาล็อก (flip-lock) ก่อนเสมอ ถ้าดึงขณะล็อกอยู่สายขาดทันที"},
      {cat:"iPhone",q:"เปิดจอ iPhone ribbon cable อยู่ด้านไหน ระวังอะไร?",ch:["ขวา เปิดเกิน 45° ขาด","ซ้าย เปิดเกิน 90° ขาด","บน ไม่ต้องระวัง","ไม่มี ribbon"],ans:1,ex:"Ribbon เชื่อมฝั่งซ้ายบน ถ้าเปิดเกิน 90° จะขาดทันที"},
      {cat:"iPhone",q:"pull-tab กาวแบต iPhone ดึงอย่างไร?",ch:["ดึงตรงขึ้น","ดึงเฉียง 45° ลงช้าๆ","งัดด้วย spudger","อุ่นก่อนดึงตรง"],ans:1,ex:"ดึงเฉียง 45° ลงช้าๆ กาวยืดออกเองไม่ขาด"},
      {cat:"Android",q:"ก่อนแกะ Android สิ่งสำคัญที่สุดต้องทำก่อนคืออะไร?",ch:["เปิด heat gun","ถ่ายรูป","ถอด SIM","ปิดเครื่องและถอดแบต"],ans:3,ex:"ต้องปิดเครื่องและถอดแบตก่อน ป้องกัน short circuit"},

/* ── Build cards ── */
window._selectedSet=null;
const grid=document.getElementById("quiz-grid");
Object.entries(window.QUIZ_SETS).forEach(([key,set])=>{
  const d=document.createElement("div");
  d.className="quiz-card "+set.cardCls;
  d.id="card-"+key;
  d.onclick=()=>{
    window._selectedSet=key;
    document.querySelectorAll(".quiz-card").forEach(c=>c.classList.remove("selected"));
    d.classList.add("selected");
    const btn=document.getElementById("btn-open");
    btn.disabled=false;
    btn.style.background=set.color;
    btn.style.color="#fff";
  };
  d.innerHTML=`
    <div class="qc-level">${set.label}</div>
    <div class="qc-name">${set.level}</div>
    <div class="qc-desc">${set.desc}</div>
    <span class="qc-pass" style="background:${set.passBg};color:${set.passColor}">เกณฑ์ผ่าน ${set.passLine}% · ${set.qs.length} ข้อ</span>`;
  grid.appendChild(d);
});
</script>
