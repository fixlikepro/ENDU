<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ข้อสอบ — Fixlikepro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');
:root{--bg:#0D0B09;--bg2:#1A1714;--bg3:#222018;--bg4:#2C2820;--orange:#E8793C;--orangeD:#B85A1E;--white:#F5F0EB;--gray1:#C8C0B8;--gray2:#7A736C;--gray3:#3A3530;--green:#27AE60;--red:#E74C3C;--greenDark:#0A2416;--redDark:#2C0A0A;--acc:#E8793C;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;padding-bottom:80px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bg4);position:sticky;top:0;background:var(--bg);z-index:20;}
.brand{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--orange);}
.top-tag{font-size:12px;background:var(--bg3);border:1px solid var(--bg4);padding:4px 12px;border-radius:20px;color:var(--gray1);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.screen{display:none;padding:22px 18px;}.screen.active{display:block;}
.pin-hero{text-align:center;margin-bottom:28px;}
.hero-icon{font-size:48px;margin-bottom:14px;}
.hero-title{font-size:24px;font-weight:700;margin-bottom:5px;}
.hero-sub{font-size:14px;color:var(--gray2);}
.lbl{display:block;font-size:13px;color:var(--gray2);margin-bottom:7px;}
.input{width:100%;background:var(--bg2);border:1.5px solid var(--bg4);border-radius:10px;padding:14px 16px;color:var(--white);font-family:'IBM Plex Mono',monospace;font-size:24px;outline:none;transition:border-color .15s;letter-spacing:.18em;text-align:center;}
.input:focus{border-color:var(--acc);}
.input::placeholder{color:var(--gray3);font-size:18px;letter-spacing:.1em;}
.input-name{font-family:'Sarabun',sans-serif;font-size:16px;letter-spacing:normal;text-align:left;}
.btn{display:block;width:100%;background:var(--orange);color:var(--bg);border:none;border-radius:10px;padding:15px;font-size:16px;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;transition:background .2s;margin-top:10px;}
.btn:hover{background:var(--orangeD);}
.btn:disabled{background:var(--bg4);color:var(--gray2);cursor:not-allowed;}
.session-card{background:var(--bg2);border:1.5px solid var(--bg4);border-radius:12px;padding:16px 18px;margin-bottom:20px;display:none;}
.session-card.show{display:block;}
.sc-label{font-size:11px;color:var(--gray2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.sc-name{font-size:18px;font-weight:700;margin-bottom:3px;}
.sc-pass{font-size:12px;color:var(--gray2);}
.error-msg{font-size:13px;color:var(--red);text-align:center;padding:8px 0;display:none;}
.error-msg.show{display:block;}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.prog-track{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.prog-bar{height:100%;border-radius:3px;transition:width .4s ease;}
.prog-lbl{font-size:12px;color:var(--gray2);white-space:nowrap;font-family:'IBM Plex Mono',monospace;}
.q-set-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:10px;}
.q-cat{font-size:10px;color:var(--gray2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;font-weight:700;}
.q-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:20px;}
.q-badge{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;font-family:'IBM Plex Mono',monospace;color:#fff;}
.q-text{font-size:16px;font-weight:600;line-height:1.55;padding-top:4px;}
.choices{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.choice{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1.5px solid var(--bg4);border-radius:10px;padding:13px 14px;cursor:pointer;transition:all .15s;font-family:'Sarabun',sans-serif;width:100%;text-align:left;}
.choice:not(:disabled):hover{border-color:var(--acc);background:var(--bg3);}
.choice:disabled{cursor:default;}
.c-letter{width:28px;height:28px;border-radius:6px;background:var(--bg4);color:var(--gray1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:'IBM Plex Mono',monospace;transition:all .15s;}
.c-text{font-size:14px;color:var(--white);line-height:1.45;}
.choice.correct{border-color:var(--green);background:var(--greenDark);}.choice.correct .c-letter{background:var(--green);color:#fff;}
.choice.wrong{border-color:var(--red);background:var(--redDark);}.choice.wrong .c-letter{background:var(--red);color:#fff;}
.choice.show-ans{border-color:var(--green);background:var(--greenDark);opacity:.6;}.choice.show-ans .c-letter{background:var(--green);color:#fff;}
.feedback{display:none;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;line-height:1.65;}
.feedback.show{display:block;animation:fadein .2s ease;}
.feedback.ok{background:var(--greenDark);border:1px solid var(--green);color:#7FE5A0;}
.feedback.ng{background:var(--redDark);border:1px solid var(--red);color:#F5A0A0;}
.btn-next{display:none;width:100%;background:var(--bg3);color:var(--white);border:1.5px solid var(--bg4);border-radius:10px;padding:14px;font-size:15px;font-weight:600;font-family:'Sarabun',sans-serif;cursor:pointer;transition:border-color .15s;}
.btn-next.show{display:block;}.btn-next:hover{border-color:var(--acc);}
.result-center{text-align:center;max-width:440px;margin:0 auto;}
.score-ring{width:110px;height:110px;border-radius:50%;border:3px solid var(--orange);background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;}
.score-big{font-size:38px;font-weight:700;font-family:'IBM Plex Mono',monospace;line-height:1;}
.score-of{font-size:12px;color:var(--gray2);}
.result-grade{font-size:22px;font-weight:700;margin-bottom:6px;}
.result-msg{font-size:14px;color:var(--gray1);margin-bottom:22px;}
.stats{display:flex;gap:8px;margin-bottom:20px;}
.stat{flex:1;background:var(--bg2);border:1px solid var(--bg4);border-radius:10px;padding:14px 8px;text-align:center;}
.stat-n{font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.stat-n.g{color:var(--green);}.stat-n.r{color:var(--red);}.stat-n.o{color:var(--orange);}
.stat-l{font-size:11px;color:var(--gray2);margin-top:3px;}
.alert{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;font-size:14px;font-weight:600;margin-bottom:10px;}
.alert.ok{background:var(--greenDark);border:1px solid var(--green);color:var(--green);}
.alert.ng{background:var(--redDark);border:1px solid var(--red);color:var(--red);}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;transition:all .3s;background:var(--bg3);border:1px solid var(--bg4);border-radius:20px;padding:9px 18px;font-size:13px;white-space:nowrap;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.sending{color:var(--orange);border-color:var(--orange);}
.toast.sent{color:var(--green);border-color:var(--green);}
.toast.err{color:var(--red);border-color:var(--red);}
@keyframes fadein{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">FIXLIKEPRO</span>
  <span class="top-tag" id="top-tag">กรอก PIN เพื่อเข้าสอบ</span>
</div>

<!-- ══ PIN SCREEN ══ -->
<div class="screen active" id="scr-pin">
  <div class="pin-hero">
    <div class="hero-icon">🔑</div>
    <h1 class="hero-title">เข้าสอบ</h1>
    <p class="hero-sub">กรอก PIN 4 หลัก ที่ครูให้ไว้</p>
  </div>
  <div class="session-card" id="session-card">
    <div class="sc-label">ชุดข้อสอบ</div>
    <div class="sc-name" id="sc-name"></div>
    <div class="sc-pass" id="sc-pass"></div>
  </div>
  <label class="lbl">PIN (4 หลัก)</label>
  <input class="input" id="pin-input" type="tel" maxlength="4" placeholder="0000" oninput="onPinInput()">
  <div class="error-msg" id="error-msg"></div>
  <div id="name-section" style="display:none;margin-top:16px;">
    <label class="lbl">ชื่อ-นามสกุล</label>
    <input class="input input-name" id="name-input" type="text" placeholder="เช่น สมชาย ใจดี" autocomplete="name" oninput="onNameInput()">
    <button class="btn" id="btn-start" disabled onclick="startQuiz()">เริ่มทำข้อสอบ →</button>
  </div>
</div>

<!-- ══ QUIZ ══ -->
<div class="screen" id="scr-quiz">
  <div class="prog-row">
    <div class="prog-track"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
    <span class="prog-lbl" id="prog-lbl">1 / 15</span>
  </div>
  <div id="quiz-body"></div>
</div>

<!-- ══ RESULT ══ -->
<div class="screen" id="scr-result">
  <div class="result-center">
    <div class="score-ring" id="score-ring">
      <div class="score-big" id="r-score">0</div>
      <div class="score-of" id="r-of">จาก 15</div>
    </div>
    <div class="result-grade" id="r-grade"></div>
    <div class="result-msg" id="r-msg"></div>
    <div class="stats">
      <div class="stat"><div class="stat-n g" id="r-ok"></div><div class="stat-l">ถูก</div></div>
      <div class="stat"><div class="stat-n r" id="r-bad"></div><div class="stat-l">ผิด</div></div>
      <div class="stat"><div class="stat-n o" id="r-pct"></div><div class="stat-l">%</div></div>
    </div>
    <div class="alert ok" id="alert-sent" style="display:none">✅ ส่งผลให้ครูเรียบร้อยแล้ว</div>
    <div class="alert ng" id="alert-fail" style="display:none">⚠️ ส่งไม่สำเร็จ — แจ้งครูด้วยนะครับ</div>
  </div>
</div>

<div class="toast" id="toast"></div>

  basic1:{name:"Basic H1",label:"BASIC H1",color:"#0D9E75",badgeBg:"#E1F5EE",badgeColor:"#097A59",passLine:80,qs:[
    {cat:"เครื่องมือ",q:"สกรูสองตัวที่อยู่บริเวณพอร์ตชาร์จของ iPhone ต้องใช้ไขควงประเภทใดในการไขออก?",ch:["ไขควงสี่แฉก (Philips #000)","ไขควงห้าแฉก (Pentalobe)","ไขควงหกเหลี่ยม (Torx T5)","ไขควงสามแฉก (Tri-point)"],ans:1,ex:"Apple ออกแบบให้สกรูภายนอกเป็นหัวห้าแฉก เพื่อความปลอดภัยและป้องกันการแกะเครื่องโดยไม่มีเครื่องมือเฉพาะทาง"},
    {cat:"เครื่องมือ",q:"เครื่องมือชนิดใดที่ช่วยให้สามารถดึงหน้าจอหรือฝาหลังขึ้นมาได้อย่างปลอดภัยที่สุด?",ch:["ปากคีบปลายแหลม","แท่งงัดโลหะ","ตัวดูดสูญญากาศ","ใบมีดคัตเตอร์"],ans:2,ex:"การใช้แรงดูดช่วยให้ยกชิ้นส่วนเรียบๆ ขึ้นได้โดยไม่ต้องใช้แรงงัดที่ขอบหน้าจอมากเกินไป ลดความเสี่ยงหน้าจอแตก"},
    {cat:"เครื่องมือ",q:"การใช้แผ่นความร้อน ควรใช้อุณหภูมิเท่าไรอุ่นกาวยึดจอ?",ch:["200-300°C","60-90°C","150-180°C","30-50°C"],ans:1,ex:"60-90°C เหมาะสำหรับทำให้กาวยึดจอและฝาหลังอ่อนตัวลง"},
    {cat:"กฎหมาย",q:"การปฏิบัติตามหลักกฎหมาย PDPA ในงานซ่อมโทรศัพท์มือถือมีความหมายว่าอย่างไร",ch:["การรับประกันว่าเครื่องเสร็จตามกำหนด","การติดตั้งโปรแกรมป้องกันไวรัสให้ลูกค้าฟรี","การใช้อะไหล่แท้จากศูนย์บริการเท่านั้น","การคุ้มครองข้อมูลส่วนบุคคลของลูกค้าไม่ให้ถูกละเมิด"],ans:3,ex:"ช่างต้องไม่เข้าถึงหรือเผยแพร่รูปภาพ ข้อความ หรือข้อมูลส่วนตัวของลูกค้าโดยไม่ได้รับอนุญาต"},
    {cat:"กฎหมาย",q:"ข้อใดต่อไปนี้จัดว่าเป็น ข้อมูลส่วนบุคคล ตามกฎหมาย PDPA?",ch:["ชื่อบริษัทและเลขทะเบียนนิติบุคคล","ข้อมูลของผู้ที่เสียชีวิตไปแล้วเกิน 10 ปี","ชื่อ นามสกุล และที่อยูอีเมล์ส่วนตัว","ข้อมูลสถิติประชากรของจังหวัดที่สรุปเป็นภาพรวม"],ans:2,ex:"ข้อมูลส่วนบุคคลคือข้อมูลที่สามารถระบุตัวตนของบุคคลนั้นได้ไม่ว่าทางตรงหรือทางอ้อม"},

    {cat:"iPhone",q:"หากสายแพชุดเซนเซอร์ของ iPhone ขาดจะส่งผลกระทบอย่างไร?",ch:["ลำโพงเสียงเรียกเข้าไม่มีเสียง","Face ID จะใช้งาานไม่ได้","หน้าจอจะมืด ไม่แสดงผล","เครื่องจะชาร์จไฟไม่เข้า"],ans:1,ex:"เซนเซอร์บนสายแพชุดนี้ถูกจับคู่รหัสไว้กับเมนบอร์เฉพาะเครื่อง การเปลี่ยนใหม่จะทำให้ Face ID ไม่ทำงาน"},

  adv2:{name:"Advance H2",label:"ADVANCE H2",color:"#3498DB",badgeBg:"#EBF5FB",badgeColor:"#1F6FAB",passLine:75,qs:[

    {cat:"CPU",q:"Thermal pad บน CPU ทำหน้าที่อะไร?",ch:["ป้องกัน ESD","ระบายความร้อนจาก CPU ออกสู่โครง","เพิ่มสัญญาณ","กันน้ำ"],ans:1,ex:"Thermal pad นำความร้อนจาก CPU ออกสู่โครงโลหะ"},
    {cat:"NAND",q:"Boot loop (ติด Logo แล้วดับ) มักสัมพันธ์กับอะไร?",ch:["ลำโพงเสีย","NAND เสีย หรือ OS เสียหาย","แบตหมด","กล้องเสีย"],ans:1,ex:"Boot loop มักเกิดจาก NAND เสีย หรือ Firmware เสียหาย"},
    {cat:"RF",q:"RF Front End Module ทำหน้าที่อะไร?",ch:["ประมวลผลภาพ","ขยายและกรองสัญญาณ RF ก่อนส่งและหลังรับจากสายอากาศ","จัดการแบต","ควบคุมจอ"],ans:1,ex:"RF FEM ขยายสัญญาณส่ง (PA) กรองความถี่ สวิตช์สัญญาณ"},

    {cat:"การซ่อม",q:"Jumper wire ใช้ทำอะไร?",ch:["เพิ่มแรงดัน","ต่อวงจรที่เส้นทองแดง PCB ขาด","ทดสอบสัญญาณ","ล้างบอร์ด"],ans:1,ex:"Jumper wire เดินสายใหม่ผ่านรู via ทดแทนเส้นทองแดงที่ขาด"},
    {cat:"CPU",q:"eMMC และ UFS ต่างกันอย่างไร?",ch:["eMMC ใหม่กว่า","UFS เร็วกว่า eMMC มาก รองรับ full-duplex","ราคาเท่ากัน","ใช้แทนกันได้"],ans:1,ex:"UFS เร็วกว่า eMMC เพราะใช้ interface serial full-duplex"},
    {cat:"Touch",q:"Face ID ใช้เทคโนโลยีใด?",ch:["กล้องธรรมดา","Structured Light โปรเจกต์จุด IR 30,000 จุด + กล้อง IR","Fingerprint","2D Camera"],ans:1,ex:"TrueDepth ฉาย dot pattern IR 30,000 จุด สร้าง 3D map"},
    {cat:"การวัด",q:"Oscilloscope ใช้วัดอะไรในงานซ่อมขั้นสูง?",ch:["ความต้านทาน","รูปคลื่นสัญญาณ voltage waveform ตามเวลา","กระแสเฉลี่ย","อุณหภูมิ"],ans:1,ex:"Oscilloscope แสดงรูปคลื่นตามเวลาจริง ตรวจ clock, data, PWM"},
    {cat:"สัญญาณ",q:"UART ใช้ทำอะไรในงานซ่อม?",ch:["Universal Analog Rectifier","Universal Async Receiver-Transmitter ใช้ดู debug log","Unified Address Register","Ultra Adaptive Radio"],ans:1,ex:"UART ใช้ 2 สาย (TX, RX) อ่าน debug log เช่น boot sequence error"},
  ]},
};

/* ════ State — ทุก variable อยู่ใน module นี้เดียว ════ */
const L = ["A","B","C","D"];
const $ = id => document.getElementById(id);

let sessionData = null;   // ← เก็บไว้ใน module scope ปลอดภัยแน่นอน
let activeSet   = null;
let studentName = "";
let curQ = 0, score = 0, answers = [];
let pinTimer = null;

/* ════ PIN ════ */
window.onPinInput = async () => {
  const pin = $("pin-input").value.trim();
  $("session-card").className = "session-card";
  $("name-section").style.display = "none";
  $("error-msg").className = "error-msg";
  sessionData = null;
  $("btn-start").disabled = true;

  if (pin.length !== 4) return;

  clearTimeout(pinTimer);
  pinTimer = setTimeout(async () => {
    try {
      const snap = await getDoc(doc(db, "sessions", pin));
      if (!snap.exists()) { showErr("ไม่พบ PIN นี้ กรุณาตรวจสอบกับครู"); return; }
      const data = snap.data();
      if (!data.active) { showErr("Session นี้ปิดแล้ว กรุณาติดต่อครู"); return; }
      const set = QUIZ_SETS[data.quizKey];
      if (!set) { showErr("ไม่พบชุดข้อสอบ กรุณาติดต่อครู"); return; }

      sessionData = data;  // ← set ใน module scope

      $("sc-name").textContent = data.quizName;
      $("sc-pass").textContent = "เกณฑ์ผ่าน " + set.passLine + "% · " + set.qs.length + " ข้อ";
      $("session-card").className = "session-card show";
      $("name-section").style.display = "block";
      document.querySelector(":root").style.setProperty("--acc", set.color);
    } catch(e) {
      showErr("เชื่อมต่อ Firebase ไม่ได้: " + e.message);
      console.error(e);
    }
  }, 600);
};

/* ════ Name ════ */
window.onNameInput = () => {
  $("btn-start").disabled = $("name-input").value.trim().length < 2;
};

/* ════ Start Quiz — อ่าน sessionData จาก module scope ════ */
window.startQuiz = () => {
  if (!sessionData) {
    showErr("กรุณากรอก PIN ก่อน");
    return;
  }
  activeSet   = QUIZ_SETS[sessionData.quizKey];
  studentName = $("name-input").value.trim();
  curQ = 0; score = 0; answers = [];

  $("top-tag").textContent = studentName + " · " + activeSet.name;
  $("prog-bar").style.background = activeSet.color;
  document.querySelector(":root").style.setProperty("--acc", activeSet.color);
  $("alert-sent").style.display = "none";
  $("alert-fail").style.display = "none";

  showScr("scr-quiz");
  renderQ();
};

/* ════ Quiz ════ */
function renderQ() {
  const q = activeSet.qs[curQ], tot = activeSet.qs.length;
  $("prog-bar").style.width = (curQ / tot * 100) + "%";
  $("prog-lbl").textContent = (curQ + 1) + " / " + tot;
  $("quiz-body").innerHTML = `
    <div class="q-set-badge" style="background:${activeSet.badgeBg};color:${activeSet.badgeColor}">${activeSet.label}</div>
    <div class="q-cat">${q.cat}</div>
    <div class="q-row">
      <div class="q-badge" style="background:${activeSet.color}">${curQ + 1}</div>
      <div class="q-text">${q.q}</div>
    </div>
    <div class="choices">
      ${q.ch.map((c,i) => `
        <button class="choice" id="c${i}" onclick="pick(${i})">
          <span class="c-letter">${L[i]}</span>
          <span class="c-text">${c}</span>
        </button>`).join("")}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="btn-next" id="btn-next" onclick="nextQ()">
      ${curQ < tot - 1 ? "ข้อถัดไป →" : "ดูผลคะแนน →"}
    </button>`;
}

window.pick = (idx) => {
  const q = activeSet.qs[curQ], ok = idx === q.ans;
  if (ok) score++;
  answers.push({ qIdx: curQ, chosen: idx, ok });
  document.querySelectorAll(".choice").forEach((b,i) => {
    b.disabled = true;
    if (i === idx && ok)         b.className = "choice correct";
    else if (i === idx && !ok)   b.className = "choice wrong";
    else if (!ok && i === q.ans) b.className = "choice show-ans";
  });
  const fb = $("fb");
  fb.className = ok ? "feedback show ok" : "feedback show ng";
  fb.innerHTML = ok
    ? `<strong>✓ ถูกต้อง!</strong><br>${q.ex}`
    : `<strong>✗ ยังไม่ถูก</strong><br>คำตอบที่ถูกคือ <strong>${L[q.ans]}. ${q.ch[q.ans]}</strong><br>${q.ex}`;
  $("btn-next").className = "btn-next show";
};

window.nextQ = () => {
  curQ++;
  curQ >= activeSet.qs.length ? showResult() : renderQ();
};

/* ════ Result ════ */
function showResult() {
  const tot  = activeSet.qs.length;
  const pct  = Math.round(score / tot * 100);
  const pass = pct >= activeSet.passLine;

  $("score-ring").style.borderColor = activeSet.color;
  $("r-score").textContent = score;
  $("r-score").style.color = activeSet.color;
  $("r-of").textContent    = "จาก " + tot;
  $("r-ok").textContent    = score;
  $("r-bad").textContent   = tot - score;
  $("r-pct").textContent   = pct;

  let grade, msg;
  if (pct === 100) { grade = "🏆 Perfect!"; msg = "ยอดเยี่ยม ทุกข้อถูกต้อง!"; }
  else if (pass)   { grade = "✅ ผ่าน"; msg = pct + "% — ผ่านเกณฑ์ " + activeSet.passLine + "% แล้ว!"; }
  else             { grade = "❌ ยังไม่ผ่าน"; msg = pct + "% — เกณฑ์ " + activeSet.passLine + "% ลองทบทวนใหม่นะครับ"; }

  $("r-grade").textContent = grade;
  $("r-msg").textContent   = msg;
  showScr("scr-result");

  const wrongTopics = [...new Set(answers.filter(a => !a.ok).map(a => activeSet.qs[a.qIdx].cat))];
  showToast("กำลังส่งผลให้ครู...", "sending");

  addDoc(collection(db, "results"), {
    name:        studentName,
    score,
    total:       tot,
    pct,
    passed:      pass,
    wrongTopics,
    wrongItems:  answers.filter(a => !a.ok).map(a => activeSet.qs[a.qIdx].q),
    quiz:        activeSet.name,
    pin:         sessionData.pin,
    quizKey:     sessionData.quizKey,
    submittedAt: serverTimestamp()
  }).then(() => {
    showToast("✓ ส่งผลสำเร็จ", "sent");
    $("alert-sent").style.display = "flex";
    setTimeout(hideToast, 3500);
  }).catch(e => {
    console.error(e);
    showToast("ส่งไม่สำเร็จ: " + e.message, "err");
    $("alert-fail").style.display = "flex";
  });
}

/* ════ Helpers ════ */
function showScr(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function showErr(msg) {
  const e = $("error-msg");
  e.textContent = msg;
  e.className = "error-msg show";
}
function showToast(msg, cls) {
  const t = $("toast");
  t.textContent = msg;
  t.className = "toast show " + (cls || "");
}
function hideToast() { $("toast").className = "toast"; }
</script>
</body>
</html>
